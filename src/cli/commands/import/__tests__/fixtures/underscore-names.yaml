default_agent: my_search_agent
agents:
  my_search_agent:
    name: my_search_agent
    entrypoint: main.py
    deployment_type: direct_code_deploy
    runtime_type: PYTHON_3_12
    language: python
    aws:
      account: '111122223333'
      region: us-west-2
      network_configuration:
        network_mode: PUBLIC
      protocol_configuration:
        server_protocol: HTTP
      observability:
        enabled: true
    bedrock_agentcore:
      agent_id: agent-us-111
    memory:
      mode: NO_MEMORY
  my_chat_agent:
    name: my_chat_agent
    entrypoint: main.py
    deployment_type: direct_code_deploy
    runtime_type: PYTHON_3_12
    language: python
    aws:
      account: '111122223333'
      region: us-west-2
      network_configuration:
        network_mode: PUBLIC
      protocol_configuration:
        server_protocol: MCP
      observability:
        enabled: true
    bedrock_agentcore:
      agent_id: agent-us-222
    memory:
      mode: NO_MEMORY
