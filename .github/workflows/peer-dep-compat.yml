name: Peer Dependency Compatibility

on:
  push:
    branches: [main]
    paths: [package.json]
  pull_request:
    branches: [main]
    paths: [package.json]

jobs:
  check-peer-deps:
    name: Check Peer Dep Compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - run: npm ci

      - name: Check peer dep compatibility
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/check-peer-dep-compat.mjs
